name: Build and Release dylib

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-14

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Compile dylib directly via Clang
      run: |
        echo "=== Đang biên dịch BedrockNBT-LITE ==="
        
        # Lệnh biên dịch trực tiếp ra file .dylib cho kiến trúc arm64 (iPhone/iPad)
        # Nếu bạn có thêm file imgui, hãy cộng thêm vào cuối lệnh (vd: imgui/*.cpp)
        clang++ -dynamiclib -std=c++17 \
          -arch arm64 \
          -isysroot $(xcrun --sdk iphoneos --show-sdk-path) \
          -miphoneos-version-min=15.0 \
          -fobjc-arc \
          -framework Foundation -framework UIKit \
          Main.mm GUI.mm \
          -o BedrockNBT_LITE.dylib
          
        echo "=== Biên dịch thành công! ==="
        ls -la BedrockNBT_LITE.dylib

    # Tự động tạo Release và upload file .dylib lên GitHub Release khi push code
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      if: github.ref == 'refs/heads/main'
      with:
        tag_name: v0.1.0-beta
        name: BedrockNBT-LITE Build v0.1.0
        draft: false
        prerelease: false
        files: BedrockNBT_LITE.dylib
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}