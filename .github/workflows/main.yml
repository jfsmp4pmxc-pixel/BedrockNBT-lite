name: Build and Upload dylib

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-14

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Compile dylib directly via Clang
      run: |
        echo "=== Đang biên dịch BedrockNBT-LITE ==="
        
        clang++ -dynamiclib -std=c++17 \
          -arch arm64 \
          -isysroot $(xcrun --sdk iphoneos --show-sdk-path) \
          -miphoneos-version-min=15.0 \
          -fobjc-arc \
          -framework Foundation -framework UIKit \
          Main.mm GUI.mm \
          -o BedrockNBT_LITE.dylib
          
        echo "=== Biên dịch thành công! ==="
        ls -la BedrockNBT_LITE.dylib

    # Nhả file dylib ra mục Artifact của trang cá nhân
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: BedrockNBT-LITE-Pure-Dylib
        path: BedrockNBT_LITE.dylib