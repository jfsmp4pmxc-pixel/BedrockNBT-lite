name:  BedrockNBT-LITE

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install Dependencies (Linux Cross-Compile)
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential perl git curl libssl-dev make clang target-cli-at

    - name: Set up Theos Environment
      run: |
        bash -c "$(curl -fsSL https://raw.githubusercontent.com/theos/theos/master/bin/install-theos)"
        echo "THEOS=$HOME/theos" >> $GITHUB_ENV
        
    - name: Set up iOS SDK
      run: |
        git clone https://github.com/theos/sdks.git $HOME/theos/sdks
        
    - name: Compile Tweak dylib
      run: |
        export THEOS=$HOME/theos
        make package FINALPACKAGE=1
        
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: BedrockNBT-LITE-Package
        path: packages/*.deb