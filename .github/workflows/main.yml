name: Build BedrockNBT-LITE

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-14

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup Theos Framework
      run: |
        git clone --recursive https://github.com/theos/theos.git $HOME/theos

    # Sửa đoạn này: Xóa thư mục cũ đi trước rồi mới clone SDK về
    - name: Setup iOS SDK
      run: |
        rm -rf $HOME/theos/sdks
        git clone --depth=1 https://github.com/theos/sdks.git $HOME/theos/sdks

    - name: Compile Tweak dylib
      run: |
        export THEOS=$HOME/theos
        export PATH=$THEOS/bin:$PATH
        make package FINALPACKAGE=1
        
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: BedrockNBT-LITE-Package
        path: packages/*.deb