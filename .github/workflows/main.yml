name: Build BedrockNBT-LITE

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install Dependencies (Linux Cross-Compile)
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential perl git curl libssl-dev make clang unzip

    # 1. Clone trực tiếp mã nguồn Theos thủ công
    - name: Clone Theos Framework
      run: |
        git clone --recursive https://github.com/theos/theos.git $HOME/theos

    # 2. Tải Toolchain biên dịch iOS dành riêng cho Linux
    - name: Install Linux iOS Toolchain
      run: |
        mkdir -p $HOME/theos/toolchain/linux/iphone
        curl -LO https://github.com/theos/toolchain/releases/download/linux-arm64/toolchain-linux-arm64.tar.xz
        tar -xf toolchain-linux-arm64.tar.xz -C $HOME/theos/toolchain/linux/iphone --strip-components=1
        rm toolchain-linux-arm64.tar.xz

    # 3. Kéo SDK iOS về như cũ
    - name: Prepare iOS SDKs
      run: |
        git clone --depth=1 https://github.com/theos/sdks.git $HOME/theos/sdks

    # 4. Thiết lập biến môi trường và tiến hành Build
    - name: Compile Tweak dylib
      run: |
        export THEOS=$HOME/theos
        export PATH=$THEOS/bin:$PATH
        make package FINALPACKAGE=1
        
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: BedrockNBT-LITE-Package
        path: packages/*.deb